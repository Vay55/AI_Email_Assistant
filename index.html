<!DOCTYPE html>
<html>
<head>
  <title>AI Email Assistant</title>
</head>
<body>

<div class="container">

  <h1 style="font-size: 40px;">📧 AI Email Assistant</h1>

  <textarea id="email" rows="10" cols="50" placeholder="Paste email here..."></textarea>
  <br><br>

  <div class="button-group">
  <button onclick="summarize()">Summarize</button>
  <button onclick="reply()">Reply</button>
  <button onclick="intent()">Intent</button>
  <button onclick="urgency()">Urgency</button>
  <button onclick="improve()">Improve Tone</button>
  <button onclick="useLast()">Use Last Output</button>
  </div>

  <style>
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  </style>

  <h3>Output:</h3>
  <p id="output"></p>

  <script src="script.js"></script>


<!-- Main UI design -->
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0d0a24, #061E29, #461220);
    background-size: 400% 400%;

    background-repeat: no-repeat;
    background-attachment: fixed;
    color: #ffd29d;

    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;  
    align-items: center;
    
    animation: gradientMove 10s ease-in-out infinite;
  }

  .container {
    width: 100%;
    max-width: 500px;
    text-align: center;
   }

  textarea {
    width: 100%;
    height: 150px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background-color: #ffd29d;
    color: #000000;
    text-align: left;

    box-shadow: inset 0 0 5px rgba(0,0,0,0.3);
  }

  button {
    background-color: #ffd29d;
    color: #000000;
    border: none;
    padding: 10px 14px;
    margin: 5px;
    border-radius: 8px;
    cursor: pointer;
  }

  .button-group {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }

  #output {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    background-color: #ffd29d;
    color: #000000;
    text-align: left;
  }

  @keyframes gradientMove {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
  }

</style>

</div>
</body>
</html>
